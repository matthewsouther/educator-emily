<!doctype html>
<!-- HTML file pre-processed by 11ty with Liquid -->
<style>
  .container {
    display: flex;
    justify-content: space-between;
    max-width: 100%;
  }
  form {
    flex-basis: 600px;
    display: flex;
    flex-direction: column;
  }
  form p {
    margin-block: 0.5em;
  }
  form p label {
    display: block;
  }
  form p label:has(~ [required]):after {
    content: " *";
    color: red;
  }
  form p input,
  textarea {
    padding: 0.5rem;
    width: 100%;
    box-sizing: border-box;
    font-size: 16px;
  }
  form p input[type="checkbox"] {
    width: auto;
    transform: scale(1.5);
    margin-right: 0.5rem;
  }
  form p input[type="checkbox"] + label {
    display: inline;
  }
  form button {
    background-color: #ffc300;
    border: none;
    padding: 1rem;
    cursor: pointer;
    font-size: large;
    font-weight: bold;
    font-family: inherit;
  }
</style>
<script>
  const handleSubmit = async (event) => {
    event.preventDefault();
    const form = event.target;
    const formData = new FormData(form);
    const headers = { "Content-Type": "application/x-www-form-urlencoded" };
    const body = new URLSearchParams(formData).toString();
    try {
      await fetch("/", { method: "POST", headers, body });
      alert(
        "Thanks for getting in touch! We have received your form submission, and will get back to you soon.",
      );
      form.reset();
    } catch (err) {
      alert(err);
    }
  };
</script>
<div class="container">
  <div class="margin"></div>
  <form name="contact" netlify onsubmit="handleSubmit(event)">
    <p>
      <label for="name">Your name</label>
      <input id="name" type="text" name="name" required />
    </p>
    <p>
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required />
    </p>
    <p>
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </p>
    <div data-netlify-recaptcha="true"></div>
    <p>
      <button type="submit">Submit</button>
    </p>
  </form>
  <div class="margin"></div>
</div>
